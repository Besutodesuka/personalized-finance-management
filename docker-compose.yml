version: '3.8'

services:
  backend:
    build: ./backend
    container_name: expense-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - VLLM_URL=${VLLM_URL:-http://vllm:8001}
      - MODEL_NAME=${MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct}
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: expense-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    container_name: expense-vllm
    profiles:
      - ai
    ports:
      - "8001:8000"
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    command: >-
      --model ${MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct}
      --dtype auto
      --max-model-len 8192
      --host 0.0.0.0
      --gpu-memory-utilization 0.85
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
