services:
  backend:
    build: ./backend
    container_name: expense-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - VLLM_URL=${VLLM_URL:-http://ollama:11434}
      - MODEL_NAME=${MODEL_NAME:-qwen2.5:3b}
      - CHAT_THINK=${CHAT_THINK:-true}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: expense-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: expense-ollama
    profiles:
      - ai
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_MODELS_DIR:-~/.ollama}:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama
    container_name: expense-ollama-pull
    profiles:
      - ai
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=${MODEL_NAME:-qwen2.5:3b}
    entrypoint: ["/bin/sh", "-c", "ollama pull $${MODEL_NAME}"]
    restart: "no"
