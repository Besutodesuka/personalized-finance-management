<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">💸</span>
        <span class="logo-text">Expense</span>
      </div>
      <ul class="nav-list">
        <li class="nav-item active" data-tab="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Dashboard</span>
        </li>
        <li class="nav-item" data-tab="expenses" onclick="navigate('expenses')">
          <span class="nav-icon">📋</span>
          <span class="nav-label">Expenses</span>
        </li>
        <li class="nav-item" data-tab="wallets" onclick="navigate('wallets')">
          <span class="nav-icon">👛</span>
          <span class="nav-label">Wallets</span>
        </li>
        <li class="nav-item" data-tab="subscriptions" onclick="navigate('subscriptions')">
          <span class="nav-icon">🔁</span>
          <span class="nav-label">Subscriptions</span>
        </li>
        <li class="nav-item" data-tab="categories" onclick="navigate('categories')">
          <span class="nav-icon">🏷️</span>
          <span class="nav-label">Categories</span>
        </li>
        <li class="nav-item" data-tab="chat" onclick="navigate('chat')">
          <span class="nav-icon">🤖</span>
          <span class="nav-label">AI Chat</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <a href="http://localhost:8000/api/export/expenses.csv" class="export-btn" target="_blank">↓ CSV</a>
        <a href="http://localhost:8000/api/export/data.json" class="export-btn" target="_blank">↓ JSON</a>
      </div>
    </nav>

    <!-- Main -->
    <main class="main-content" id="main-content">
      <div class="loading">Loading...</div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal" onclick="handleModalClick(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
